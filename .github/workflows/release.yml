name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  # ─────────────── Linux .deb ───────────────
  build-linux:
    name: Build .deb (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxkbcommon-x11-0 libegl1 \
            libdbus-1-3 libxcb-cursor0 dpkg-dev fakeroot

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller --noconfirm --clean fzbgptools.spec

      - name: Read version
        id: v
        run: |
          VERSION=$(python -c "from src.version import __version__; print(__version__)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build .deb
        run: |
          chmod +x build/linux/build-deb.sh
          bash build/linux/build-deb.sh ${{ steps.v.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fzbgptools-deb
          path: dist/*.deb

  # ─────────────── Windows .exe ───────────────
  build-windows:
    name: Build .exe (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller Pillow

      - name: Generate icon.ico from icon.png
        shell: pwsh
        run: |
          python -c "from PIL import Image; img = Image.open('src/resources/icon.png'); img.save('src/resources/icon.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Build binary
        run: pyinstaller --noconfirm --clean fzbgptools.spec

      - name: Read version
        id: v
        shell: pwsh
        run: |
          $v = python -c "from src.version import __version__; print(__version__)"
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build installer
        shell: cmd
        run: |
          makensis /DVERSION=${{ steps.v.outputs.version }} build\windows\installer.nsi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fzbgptools-exe
          path: dist/*-setup.exe

  # ─────────────── Publish Release ───────────────
  release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract changelog for tag
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Extract section for this version from CHANGELOG.md
          awk -v v="$VERSION" '
            /^## \[/ { if (found) exit; if ($0 ~ "\\["v"\\]") found=1; next }
            found { print }
          ' CHANGELOG.md > release_notes.txt
          [ -s release_notes.txt ] || echo "Release v$VERSION" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/fzbgptools-deb/*.deb
            artifacts/fzbgptools-exe/*-setup.exe
          body_path: release_notes.txt
          draft: false
          prerelease: false
